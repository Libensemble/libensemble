name: libEnsemble-complete-CI

on:
  workflow_dispatch:

jobs:
    test-libE:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
                mpi-version: [mpich]
                python-version: ["py310", "py311", "py312", "py313", "py314"]
                comms-type: [m, l]
                include:
                    - os: macos-latest
                      python-version: "py313"
                      mpi-version: mpich
                      comms-type: m
                    - os: macos-latest
                      python-version: "py313"
                      mpi-version: mpich
                      comms-type: l
                    - os: ubuntu-latest
                      python-version: "py312"
                      mpi-version: mpich
                      comms-type: t
                    - os: ubuntu-latest
                      mpi-version: openmpi
                      python-version: "py312"
                      comms-type: l

        env:
            HYDRA_LAUNCHER: 'fork'
            TERM: xterm-256color
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        defaults:
            run:
                shell: bash -l {0}

        steps:
        - uses: actions/checkout@v6
          with:
            lfs: true

        - name: Checkout lockfile
          run: git lfs checkout

        - uses: prefix-dev/setup-pixi@v0.9.2
          with:
            pixi-version: v0.55.0
            cache: true
            frozen: true
            environments: ${{ matrix.python-version }}
            activate-environment: ${{ matrix.python-version }}

        - name: Install other testing dependencies
          run: |
            pixi run -e ${{ matrix.python-version }} install/install_ibcdfo.sh

        - name: Install libEnsemble, flake8, lock environment
          run: |
            pip install -e .
            flake8 libensemble

        - name: Remove test using octave, gpcam on Python 3.13
          if: matrix.python-version == 'py313' || matrix.python-version == 'py314'
          run: |
            rm ./libensemble/tests/regression_tests/test_persistent_fd_param_finder.py # needs octave, which doesn't yet support 3.13
            rm ./libensemble/tests/regression_tests/test_persistent_aposmm_external_localopt.py # needs octave, which doesn't yet support 3.13
            rm ./libensemble/tests/regression_tests/test_gpCAM.py # needs gpcam, which doesn't build on 3.13

        - name: Start Redis
          if: matrix.os == 'ubuntu-latest'
          uses: supercharge/redis-github-action@v2
          with:
            redis-version: 7

        - name: Run extensive tests, Ubuntu
          if: matrix.os == 'ubuntu-latest'
          run: |
           ./libensemble/tests/run_tests.py -e -A "-W error" -${{ matrix.comms-type }}

        - name: Run extensive tests, macOS
          if: matrix.os == 'macos-latest'
          run: |
           pixi run -e ${{ matrix.python-version }} ./libensemble/tests/run_tests.py -e -A "-W error" -${{ matrix.comms-type }}

        - name: Merge coverage
          run: |
            mv libensemble/tests/.cov* .

        - name: Upload coverage reports to Codecov
          uses: codecov/codecov-action@v5
          env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    spellcheck:
        name: Spellcheck release branch
        if: contains(github.base_ref, 'develop')
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
        - uses: crate-ci/typos@v1.42.0
